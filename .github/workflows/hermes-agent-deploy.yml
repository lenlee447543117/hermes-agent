name: Hermes Agent Deploy (Hulao)

on:
  push:
    branches: ["main"]
    paths:
      - "hermes-agent-main/**/*.py"
      - "hermes-agent-main/Dockerfile"
      - "hermes-agent-main/docker/**"
      - "hermes-agent-main/pyproject.toml"
      - "hermes-agent-main/uv.lock"
      - ".github/workflows/hermes-agent-deploy.yml"

env:
  DOCKER_PLATFORM: linux/amd64

jobs:
  build-and-push:
    name: Build & Push Hermes Agent Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (amd64, smoke test)
        uses: docker/build-push-action@v5
        with:
          context: ./hermes-agent-main
          file: ./hermes-agent-main/Dockerfile
          load: true
          platforms: linux/amd64
          tags: hulao/hermes-agent:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image starts
        run: |
          mkdir -p /tmp/hermes-test
          sudo chown -R 10000:10000 /tmp/hermes-test
          docker run --rm \
            -v /tmp/hermes-test:/opt/data \
            --entrypoint /opt/hermes/docker/entrypoint.sh \
            hulao/hermes-agent:test --help

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Push multi-arch image to Aliyun ACR
        uses: docker/build-push-action@v5
        with:
          context: ./hermes-agent-main
          file: ./hermes-agent-main/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/hulao/hulao:latest
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/hulao/hulao:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Notification
        run: |
          echo "Hermes Agent image built and pushed successfully"
          echo "Image tag: ${{ github.sha }}"
          echo "Aliyun ACR: ${{ secrets.ALIYUN_ACR_REGISTRY }}/hulao/hulao:latest"
