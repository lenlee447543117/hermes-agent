name: Hermes Instance Deploy (Cloud Brain)

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "hermes/**"

env:
  DOCKER_PLATFORM: linux/amd64
  GLM_MODEL: "glm-4.7"
  ACR_REGISTRY: "crpi-93aishco2498dfmq.cn-shanghai.personal.cr.aliyuncs.com"
  ACR_REPOSITORY: "hulao/hulao"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: hermes
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./hermes
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/hermes:${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY }}/hermes:latest
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:${{ github.sha }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:latest
          platforms: ${{ env.DOCKER_PLATFORM }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ZHIPU_API_KEY=${{ secrets.ZHIPU_API_KEY }}

      - name: Deploy Notification
        run: |
          echo "Hermes image built and pushed successfully"
          echo "Image tag: ${{ github.sha }}"
          echo "GitHub Container Registry: ${{ secrets.DOCKER_REGISTRY }}/hermes:latest"
          echo "Aliyun ACR: ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:latest"
          echo "Next: Update running instances via admin API"
