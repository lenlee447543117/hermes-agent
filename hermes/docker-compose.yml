version: "3.8"

services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ZHIPU_API_KEY: ${ZHIPU_API_KEY}
    container_name: hermes-${USER_ID:-default}
    ports:
      - "${HERMES_PORT:-8000}:8000"
    environment:
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - GLM_47_API_KEY=${GLM_47_API_KEY}
      - AUTOGLM_PHONE_API_KEY=${AUTOGLM_PHONE_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://hermes:${DB_PASSWORD}@postgres:5432/hermes_${USER_ID:-default}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - USER_ID=${USER_ID:-default}
      - GLM_MODEL=${GLM_MODEL:-glm-4.7}
      - GLM_MAX_TOKENS=${GLM_MAX_TOKENS:-4096}
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  redis:
    image: redis:7-alpine
    container_name: hermes-redis-${USER_ID:-default}
    ports:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: hermes-pg-${USER_ID:-default}
    environment:
      - POSTGRES_USER=hermes
      - POSTGRES_PASSWORD=${DB_PASSWORD:-hermes_secret}
      - POSTGRES_DB=hermes_${USER_ID:-default}
    ports:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
