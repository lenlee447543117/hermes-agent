# =============================================================================
# AI沪老 2.0 - Hermes Agent 配置文件
# =============================================================================
# 本文件配置 Hermes 后端服务的核心行为
# =============================================================================

# =============================================================================
# 模型配置
# =============================================================================
model:
  # 默认使用智谱 GLM-4-Plus 模型
  default: "glm-4-plus"
  
  # 推理提供商：使用智谱 AI (z.ai)
  provider: "zai"
  
  # 智谱 API 基础地址
  base_url: "https://api.z.ai/api/paas/v4"

# =============================================================================
# 备用模型（当主模型不可用时自动切换）
# =============================================================================
fallback_providers:
  - provider: "zai"
    model: "glm-4-flash"
  - provider: "zai"
    model: "glm-4"

# =============================================================================
# 终端工具配置
# =============================================================================
terminal:
  backend: "local"
  cwd: "."
  timeout: 120
  lifetime_seconds: 600
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200
  container_persistent: true

# =============================================================================
# 浏览器工具配置
# =============================================================================
browser:
  inactivity_timeout: 120

# =============================================================================
# 上下文压缩（自动缩减长对话）
# =============================================================================
compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20

# =============================================================================
# 提示缓存
# =============================================================================
prompt_caching:
  cache_ttl: "5m"

# =============================================================================
# 辅助模型配置
# =============================================================================
auxiliary:
  # 视觉分析（屏幕截图识别）
  vision:
    provider: "zai"
    model: "glm-4v-flash"
    timeout: 30
    download_timeout: 30
  
  # 网页内容提取
  web_extract:
    provider: "zai"
    model: "glm-4-flash"
  
  # 会话搜索
  session_search:
    provider: "zai"
    model: "glm-4-flash"
    timeout: 30
    max_concurrency: 3

# =============================================================================
# 持久化记忆
# =============================================================================
memory:
  enabled: true
  memory_max_chars: 8000
  user_max_chars: 4000

# =============================================================================
# 代理行为配置
# =============================================================================
agent:
  max_turns: 30
  gateway_timeout: 300
  gateway_timeout_warning: 60
  gateway_notify_interval: 30

# =============================================================================
# 安全配置
# =============================================================================
security:
  redact_secrets: true

# =============================================================================
# 时区
# =============================================================================
timezone: "Asia/Shanghai"

# =============================================================================
# 网关配置 - API 服务器（供 Android App 调用）
# =============================================================================
gateway:
  platforms:
    api_server:
      enabled: true
      # API 认证密钥（与 .env 中 API_SERVER_KEY 对应）
      api_key: "hulao_2026_secure_api_key_change_in_production"
      host: "0.0.0.0"
      port: 8642
      # 允许的 CORS 来源（Android App）
      cors_origins:
        - "*"
  
  # 会话重置策略
  session_reset:
    mode: "idle"
    idle_minutes: 1440
    notify: true
  
  # 响应节奏（让老人感觉更自然）
  human_delay:
    mode: "natural"
    min_ms: 500
    max_ms: 1500

# =============================================================================
# 显示配置
# =============================================================================
display:
  busy_input_mode: "queue"

# =============================================================================
# 网络配置
# =============================================================================
network:
  force_ipv4: false
